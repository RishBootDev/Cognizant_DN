<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercise 10.2 - Tabbed Navigation</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-5">

    <h2 class="mb-3">Nav Tabs</h2>

    <ul class="nav nav-tabs" id="myTabs" role="tablist">

        <li class="nav-item" role="presentation">
            <button class="nav-link active"
                    id="home-tab"
                    data-bs-toggle="tab"
                    data-bs-target="#home"
                    type="button">
                Home
            </button>
        </li>

        <li class="nav-item" role="presentation">
            <button class="nav-link"
                    id="profile-tab"
                    data-bs-toggle="tab"
                    data-bs-target="#profile"
                    type="button">
                Profile
            </button>
        </li>

        <li class="nav-item" role="presentation">
            <button class="nav-link"
                    id="contact-tab"
                    data-bs-toggle="tab"
                    data-bs-target="#contact"
                    type="button">
                Contact
            </button>
        </li>

    </ul>

    <div class="tab-content border border-top-0 p-3 mb-5">

        <div class="tab-pane fade show active" id="home">
            <h4>Home</h4>
            <p>Welcome to the Home page.</p>
        </div>

        <div class="tab-pane fade" id="profile">
            <h4>Profile</h4>
            <p>User profile information appears here.</p>
        </div>

        <div class="tab-pane fade" id="contact">
            <h4>Contact</h4>
            <p>Contact details appear here.</p>
        </div>

    </div>

    <h2 class="mb-3">Nav Pills</h2>

<ul class="nav nav-pills mb-3" id="pill-tab" role="tablist">

    <li class="nav-item" role="presentation">
        <button class="nav-link active"
                data-bs-toggle="pill"
                data-bs-target="#dashboard"
                type="button">
            Dashboard
        </button>
    </li>

    <li class="nav-item" role="presentation">
        <button class="nav-link"
                data-bs-toggle="pill"
                data-bs-target="#reports"
                type="button">
            Reports
        </button>
    </li>

    <li class="nav-item" role="presentation">
        <button class="nav-link"
                data-bs-toggle="pill"
                data-bs-target="#settings"
                type="button">
            Settings
        </button>
    </li>

</ul>

<div class="tab-content border p-3">

    <div class="tab-pane fade show active" id="dashboard">
        <h4>Dashboard</h4>
        <p>Dashboard content goes here.</p>
    </div>

    <div class="tab-pane fade" id="reports">
        <h4>Reports</h4>
        <p>Reports content goes here.</p>
    </div>

    <div class="tab-pane fade" id="settings">
        <h4>Settings</h4>
        <p>Settings content goes here.</p>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
