<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercise 18.2</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-5">

    <h2 class="mb-4">
        Bootstrap Accordion
    </h2>

    <div class="accordion" id="faqAccordion">

        <div class="accordion-item">

            <h2 class="accordion-header">

                <button
                    class="accordion-button"
                    type="button"
                    data-bs-toggle="collapse"
                    data-bs-target="#item1">

                    What is Bootstrap?

                </button>

            </h2>

            <div
                id="item1"
                class="accordion-collapse collapse show"
                data-bs-parent="#faqAccordion">

                <div class="accordion-body">

                    Bootstrap is a CSS and JavaScript framework for responsive web development.

                </div>

            </div>

        </div>

        <div class="accordion-item">

            <h2 class="accordion-header">

                <button
                    class="accordion-button collapsed"
                    type="button"
                    data-bs-toggle="collapse"
                    data-bs-target="#item2">

                    Why use Bootstrap?

                </button>

            </h2>

            <div
                id="item2"
                class="accordion-collapse collapse"
                data-bs-parent="#faqAccordion">

                <div class="accordion-body">

                    It speeds up UI development using prebuilt components and utilities.

                </div>

            </div>

        </div>

        <div class="accordion-item">

            <h2 class="accordion-header">

                <button
                    class="accordion-button collapsed"
                    type="button"
                    data-bs-toggle="collapse"
                    data-bs-target="#item3">

                    Is Bootstrap responsive?

                </button>

            </h2>

            <div
                id="item3"
                class="accordion-collapse collapse"
                data-bs-parent="#faqAccordion">

                <div class="accordion-body">

                    Yes. Bootstrap provides a responsive grid system and responsive utilities.

                </div>

            </div>

        </div>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
