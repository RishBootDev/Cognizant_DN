<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercise 14.1</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-5">

    <h2 class="mb-4">Display & Visibility Demo</h2>

    <!-- Hidden on all screens -->
    <div class="d-none bg-danger text-white p-3 mb-3">
        Hidden Everywhere
    </div>

    <!-- Visible only on md and above -->
    <div class="d-none d-md-block bg-primary text-white p-3 mb-3">
        Visible on Tablets and Desktops
    </div>

    <!-- Visible only on lg and above -->
    <div class="d-none d-lg-flex bg-success text-white p-3 justify-content-center">
        Visible on Large Screens (Flex Layout)
    </div>

</div>

</body>
</html>
