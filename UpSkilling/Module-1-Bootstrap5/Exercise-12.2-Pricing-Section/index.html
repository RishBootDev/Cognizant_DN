<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercise 12.2</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container py-5">

    <h2 class="text-center mb-5">
        Pricing Plans
    </h2>

    <div class="row">

        <div class="col-md-4 mb-4">

            <div class="card p-4 text-center h-100">

                <h3>Basic</h3>

                <h1 class="my-4">
                    ₹499
                </h1>

                <p>5 Projects</p>
                <p>Email Support</p>

                <button class="btn btn-primary mt-3">
                    Choose Plan
                </button>

            </div>

        </div>

        <div class="col-md-4 mb-4">

            <div class="card p-4 text-center h-100 border-primary">

                <h3>Pro</h3>

                <h1 class="my-4">
                    ₹999
                </h1>

                <p>20 Projects</p>
                <p>Priority Support</p>

                <button class="btn btn-primary mt-3">
                    Choose Plan
                </button>

            </div>

        </div>

        <div class="col-md-4 mb-4">

            <div class="card p-4 text-center h-100">

                <h3>Enterprise</h3>

                <h1 class="my-4">
                    ₹1999
                </h1>

                <p>Unlimited Projects</p>
                <p>24/7 Support</p>

                <button class="btn btn-primary mt-3">
                    Choose Plan
                </button>

            </div>

        </div>

    </div>

</div>

</body>
</html>
