server:
  port: 8081

spring:
  application:
    name: api-gateway-load-balancing-exercises
  cloud:
    gateway:
      routes:
        - id: example_route
          uri: https://httpbin.org
          predicates:
            - Path=/example/**
          filters:
            - StripPrefix=1
        - id: load_balanced_route
          uri: lb://example-service
          predicates:
            - Path=/loadbalanced/**
          filters:
            - StripPrefix=1
        - id: resilience_route
          uri: https://httpbin.org
          predicates:
            - Path=/resilience/**
          filters:
            - name: CircuitBreaker
              args:
                name: exampleCircuitBreaker
                fallbackUri: forward:/fallback/example
            - StripPrefix=1
    discovery:
      client:
        simple:
          instances:
            example-service:
              - uri: https://httpbin.org
              - uri: https://postman-echo.com

resilience4j:
  circuitbreaker:
    instances:
      exampleCircuitBreaker:
        registerHealthIndicator: true
        slidingWindowSize: 10
        failureRateThreshold: 50
        waitDurationInOpenState: 10s
        permittedNumberOfCallsInHalfOpenState: 3
  timelimiter:
    instances:
      exampleCircuitBreaker:
        timeoutDuration: 4s

management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway,circuitbreakers
  endpoint:
    health:
      show-details: always
