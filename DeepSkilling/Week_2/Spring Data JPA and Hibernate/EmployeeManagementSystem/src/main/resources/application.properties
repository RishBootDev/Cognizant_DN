spring.application.name=EmployeeManagementSystem

server.port=2030

spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

app.secondary.datasource.jdbc-url=jdbc:h2:mem:auditdb
app.secondary.datasource.driver-class-name=org.h2.Driver
app.secondary.datasource.username=sa
app.secondary.datasource.password=